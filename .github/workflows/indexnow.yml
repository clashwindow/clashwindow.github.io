name: IndexNow - Submit All Posts to Bing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '_posts/**'

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit all posts to IndexNow
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import json
          import urllib.request
          import urllib.error

          SITE_URL = "https://clashwindow.github.io"
          KEY = "8575fe8139f14b2da85e40bbc8b86ce2"
          HOST = "clashwindow.github.io"

          posts_dir = "_posts"
          if not os.path.isdir(posts_dir):
              print("No _posts directory found.")
              exit(0)

          urls = []
          for filename in sorted(os.listdir(posts_dir)):
              if not filename.endswith(".md"):
                  continue
              filepath = os.path.join(posts_dir, filename)
              # Try to read permalink from front matter
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      content = f.read()
                  match = re.search(r'^permalink:\s*["\']?([^"\'\n]+)["\']?', content, re.MULTILINE)
                  if match:
                      permalink = match.group(1).strip()
                      url = f"{SITE_URL}{permalink}"
                  else:
                      basename = filename.replace(".md", "")
                      slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', basename)
                      url = f"{SITE_URL}/{slug}/"
              except Exception:
                  basename = filename.replace(".md", "")
                  slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', basename)
                  url = f"{SITE_URL}/{slug}/"
              urls.append(url)

          print(f"Total URLs: {len(urls)}")

          if not urls:
              print("No URLs to submit.")
              exit(0)

          # Submit in batches of 100
          BATCH = 100
          total_ok = 0
          for i in range(0, len(urls), BATCH):
              batch = urls[i:i+BATCH]
              payload = json.dumps({
                  "host": HOST,
                  "key": KEY,
                  "keyLocation": f"{SITE_URL}/{KEY}.txt",
                  "urlList": batch
              }).encode("utf-8")
              req = urllib.request.Request(
                  "https://api.indexnow.org/indexnow",
                  data=payload,
                  headers={"Content-Type": "application/json; charset=utf-8"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      code = resp.getcode()
                      print(f"Batch {i//BATCH+1}: {len(batch)} URLs -> HTTP {code} OK")
                      total_ok += len(batch)
              except urllib.error.HTTPError as e:
                  print(f"Batch {i//BATCH+1}: HTTP {e.code} - {e.read().decode()[:200]}")
              except Exception as e:
                  print(f"Batch {i//BATCH+1}: Error - {e}")

          print(f"\nDone! {total_ok}/{len(urls)} URLs submitted to Bing IndexNow.")
          PYEOF
