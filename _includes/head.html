
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords | escape }}{% else %}{{ site.keywords | escape }}{% endif %}">

  <!-- Open Graph Tags -->
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta property="og:image" content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}{{ site.logo }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta name="twitter:image" content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}{{ site.logo }}{% endif %}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Robots Meta -->
  <meta name="robots" content="index, follow">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "url": "{{ site.url }}",
        "logo": "{{ site.url }}{{ site.logo }}",
        "name": "{{ site.title | escape }}"
      },
      {
        "@type": "WebSite",
        "url": "{{ site.url }}",
        "name": "{{ site.title | escape }}",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "{{ site.url }}/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
      {% if page.layout == 'post' %}
      ,
      {
        "@type": "NewsArticle",
        "mainEntityOfPage": {
          "@type": "WebPage",
          "@id": "{{ page.url | absolute_url }}"
        },
        "headline": "{{ page.title | escape }}",
        "image": [
          "{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}{{ site.logo }}{% endif %}"
        ],
        "datePublished": "{{ page.date | date_to_xmlschema }}",
        "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
        "author": {
          "@type": "Person",
          "name": "{% if page.author %}{{ page.author | escape }}{% else %}{{ site.author | escape }}{% endif %}"
        },
        "publisher": {
          "@type": "Organization",
          "name": "{{ site.title | escape }}",
          "logo": {
            "@type": "ImageObject",
            "url": "{{ site.url }}{{ site.logo }}"
          }
        },
        "description": "{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}"
      }
      {% endif %}
      {% if page.layout == 'post' or page.layout == 'page' %}
      ,
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "{{ site.url }}"
          }
          {% assign crumbs = page.url | split: '/' %}
          {% for crumb in crumbs offset: 1 %}
            {% unless forloop.last %}
              ,
              {
                "@type": "ListItem",
                "position": {{ forloop.index | plus: 1 }},
                "name": "{{ crumb | replace: '-', ' ' | capitalize }}",
                "item": "{{ site.url }}{% assign crumb_url = '' %}{% for i in (1..forloop.index) %}{% assign crumb_url = crumb_url | append: '/' | append: crumbs[i] %}{% endfor %}{{ crumb_url }}/"
              }
            {% else %}
              ,
              {
                "@type": "ListItem",
                "position": {{ forloop.index | plus: 1 }},
                "name": "{{ page.title | escape }}",
                "item": "{{ page.url | absolute_url }}"
              }
            {% endunless %}
          {% endfor %}
        ]
      }
      {% endif %}
      {% if page.faq %}
      ,
      {
        "@type": "FAQPage",
        "mainEntity": [
          {% for item in page.faq %}
          {
            "@type": "Question",
            "name": "{{ item.question | escape }}",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "{{ item.answer | escape }}"
            }
          }{% unless forloop.last %},{% endunless %}
          {% endfor %}
        ]
      }
      {% endif %}
    ]
  }
  </script>

  <!-- Preload Fonts (example - replace with your actual font files) -->
  <!-- <link rel="preload" href="/assets/fonts/your-font.woff2" as="font" type="font/woff2" crossorigin> -->

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Icons -->
  <link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();

          document.querySelector(this.getAttribute('href')).scrollIntoView({
            behavior: 'smooth'
          });
        });
      });
    });
  </script>
</head>
